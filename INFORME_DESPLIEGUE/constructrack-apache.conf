<VirtualHost *:80>
    ServerName constructrack.local
    ServerAlias constructrack constructrack.local
    ServerAdmin admin@constructrack.local
    
    # Proxy hacia la aplicación Java
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/
    
    # Configuración de timeout para proxy
    ProxyConnect Timeout 300
    ProxyReceiveBufferSize 4096
    ProxyTimeout 300
    
    # Headers
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
    
    # Compresión
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript
    </IfModule>
    
    # Logs
    ErrorLog ${APACHE_LOG_DIR}/constructrack_error.log
    CustomLog ${APACHE_LOG_DIR}/constructrack_access.log combined
    
    # Seguridad
    <IfModule mod_security.c>
        SecRuleEngine Off
    </IfModule>
</VirtualHost>
